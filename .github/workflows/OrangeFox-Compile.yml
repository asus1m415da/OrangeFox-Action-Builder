name: OrangeFox R12.1 Builder (Samsung A06)

on:
  workflow_dispatch:
    inputs:
      MANIFEST_BRANCH:
        description: 'Rama de OrangeFox (12.1 para la nueva interfaz)'
        required: true
        default: '12.1'
        type: choice
        options:
        - 12.1
      DEVICE_TREE:
        description: 'Link de tu Device Tree'
        required: true
        default: 'https://github.com/asus1m415da/android_device_samsung_a06_fox'
      DEVICE_TREE_BRANCH:
        description: 'Rama de tu Device Tree (ej: fox_12.1 o main)'
        required: true
        default: 'fox_12.1'
      DEVICE_PATH:
        description: 'Ruta de compilación del dispositivo'
        required: true
        default: 'device/samsung/a06'
      DEVICE_NAME:
        description: 'Nombre en clave (Codename)'
        required: true
        default: 'a06'
      BUILD_TARGET:
        description: 'Partición a compilar'
        required: true
        default: 'recovery'
        type: choice
        options:
        - recovery
        - boot
        - vendorboot

jobs:
  build:
    name: Compilando OrangeFox para ${{ inputs.DEVICE_NAME }}
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
    - name: Checkout del código base
      uses: actions/checkout@v4
      
    - name: Limpiar servidor (Liberar espacio)
      uses: rokibhasansagar/slimhub_actions@main

    - name: Configurar Memoria Swap (24GB)
      uses: pierotofy/set-swap-space@master
      with:
        swap-size-gb: 24
        
    - name: Preparar entorno de Android
      run: |
        sudo apt update
        sudo apt -y upgrade
        sudo apt install aria2 libncurses5 -y
        git clone https://gitlab.com/OrangeFox/misc/scripts.git -b master
        cd scripts
        sudo bash setup/android_build_env.sh
        
    - name: Descargar Código Fuente de OrangeFox (${{ inputs.MANIFEST_BRANCH }})
      run: |
        mkdir -p ${GITHUB_WORKSPACE}/OrangeFox
        cd ${GITHUB_WORKSPACE}/OrangeFox
        git config --global user.name "Bot-Compilador"
        git config --global user.email "bot@github.com"
        git clone https://gitlab.com/OrangeFox/sync.git -b master
        cd sync
        ./orangefox_sync.sh --branch ${{ inputs.MANIFEST_BRANCH }} --path ${GITHUB_WORKSPACE}/OrangeFox/fox_${{ inputs.MANIFEST_BRANCH }}

    - name: Clonar el Device Tree del A06
      run: |
        cd ${GITHUB_WORKSPACE}/OrangeFox/fox_${{ inputs.MANIFEST_BRANCH }}
        git clone ${{ inputs.DEVICE_TREE }} -b ${{ inputs.DEVICE_TREE_BRANCH }} ./${{ inputs.DEVICE_PATH }}
        cd ${{ inputs.DEVICE_PATH }}
        echo "COMMIT_ID=$(git rev-parse HEAD)" >> $GITHUB_ENV

    - name: Iniciar la Compilación 🚀
      run: |
        cd ${GITHUB_WORKSPACE}/OrangeFox/fox_${{ inputs.MANIFEST_BRANCH }}
        set +e
        source build/envsetup.sh
        export ALLOW_MISSING_DEPENDENCIES=true
        export LC_ALL="C"
        set -e
        lunch twrp_${{ inputs.DEVICE_NAME }}-eng && make clean && mka adbd ${{ inputs.BUILD_TARGET }}image

    - name: Publicar el Recovery en Releases 📦
      uses: softprops/action-gh-release@v2
      with:
        files: |
          OrangeFox/fox_${{ inputs.MANIFEST_BRANCH }}/out/target/product/${{ inputs.DEVICE_NAME }}/OrangeFox*.img
          OrangeFox/fox_${{ inputs.MANIFEST_BRANCH }}/out/target/product/${{ inputs.DEVICE_NAME }}/OrangeFox*.zip
        name: OrangeFox R12.1 para ${{ inputs.DEVICE_NAME }}
        tag_name: ${{ github.run_id }}
        body: |
          ## Compilación Automatizada de OrangeFox
          * **Dispositivo:** ${{ inputs.DEVICE_NAME }}
          * **Rama Base:** fox_${{ inputs.MANIFEST_BRANCH }}
          * **Diseño:** Material Expressive (R12+)
          * **Device Tree:** ${{ inputs.DEVICE_TREE }}
          * **Commit del Tree:** ${{ env.COMMIT_ID }}
